<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; font-family: sans-serif; background: #f0f0f0; }
    header {
      background: #333;
      color: #fff;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; }
    header a {
      color: #fff;
      text-decoration: none;
      background: #555;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    header a:hover { background: #777; }
    #pdf-container {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }
    #pdf-viewer {
      width: 100%;
      height: 100%;
      border: none;
    }
    #status {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      padding: 40px;
      font-size: 1rem;
      gap: 10px;
      width: 100%;
      height: 100%;
    }
    #status a {
      color: #fff;
      text-decoration: none;
      background: #555;
      padding: 6px 12px;
      border-radius: 4px;
    }
    #status a:hover { background: #777; }
    @media (max-width: 600px) {
      header { padding: 8px 12px; }
      header h1 { font-size: 1rem; }
      header a { padding: 5px 10px; font-size: 0.85rem; }
      #pdf-container { padding: 8px; gap: 8px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Resume</h1>
    <a href="Shivam_Resume.pdf" download>Download PDF</a>
  </header>
  <div id="pdf-container">
    <embed id="pdf-viewer" src="Shivam_Resume.pdf" type="application/pdf" />
  </div>
  <script>
    // Fallback for mobile browsers that don't support embedded PDFs
    const pdf = document.getElementById('pdf-viewer');
    const container = document.getElementById('pdf-container');
    
    if (!pdf.offsetHeight) {
      container.innerHTML = '<div id="status">PDF Viewer<br><a href="Shivam_Resume.pdf" download style="color: #fff; text-decoration: none; background: #555; padding: 8px 16px; border-radius: 4px; display: inline-block; margin-top: 20px;">Download PDF</a></div>';
    }
  </script>
</body>
</html>
