<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; font-family: sans-serif; background: #f0f0f0; }
    header {
      background: #333;
      color: #fff;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; }
    header a {
      color: #fff;
      text-decoration: none;
      background: #555;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    header a:hover { background: #777; }
    #pdf-container {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 12px;
    }
    #pdf-container canvas {
      max-width: 100%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      background: #fff;
    }
    #pdf-container embed {
      width: 100%;
      height: 100%;
      border: none;
    }
    #status {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      padding: 40px;
      font-size: 1rem;
      gap: 10px;
    }
    #status a {
      color: #fff;
      text-decoration: none;
      background: #555;
      padding: 6px 12px;
      border-radius: 4px;
    }
    #status a:hover { background: #777; }
    @media (max-width: 600px) {
      header { padding: 8px 12px; }
      header h1 { font-size: 1rem; }
      header a { padding: 5px 10px; font-size: 0.85rem; }
      #pdf-container { padding: 8px; gap: 8px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Resume</h1>
    <a href="Shivam_Resume.pdf" download>Download PDF</a>
  </header>
  <div id="pdf-container">
    <div id="status">Loading…</div>
  </div>
  <script>
    // Detect device type
    function isMobileDevice() {
      return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
             window.innerWidth <= 768;
    }

    const container = document.getElementById('pdf-container');
    const status = document.getElementById('status');
    const isMobile = isMobileDevice();

    if (isMobile) {
      // Mobile: Use PDF.js for responsive rendering
      const link = document.createElement('script');
      link.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      link.onload = function() {
        pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        pdfjsLib.getDocument('Shivam_Resume.pdf').promise.then(function (pdf) {
          status.remove();
          const pages = [];
          for (let i = 1; i <= pdf.numPages; i++) {
            pages.push(i);
          }
          return pages.reduce(function (chain, pageNum) {
            return chain.then(function () { return renderPage(pdf, pageNum); });
          }, Promise.resolve());
        }).catch(function (err) {
          status.textContent = 'Could not load PDF. ';
          const link = document.createElement('a');
          link.href = 'Shivam_Resume.pdf';
          link.download = '';
          link.textContent = 'Download instead';
          status.appendChild(link);
          console.error(err);
        });
      };
      document.head.appendChild(link);
    } else {
      // Desktop: Use native PDF viewer with embed
      container.innerHTML = '<embed id="pdf-viewer" src="Shivam_Resume.pdf" type="application/pdf" />';
      status.remove();
    }

    function renderPage(pdf, pageNum) {
      return pdf.getPage(pageNum).then(function (page) {
        const style = window.getComputedStyle(container);
        const containerPadding = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
        const containerWidth = container.clientWidth - containerPadding;
        const unscaled = page.getViewport({ scale: 1 });
        const scale = containerWidth / unscaled.width;
        const viewport = page.getViewport({ scale: scale });
        const dpr = window.devicePixelRatio || 1;

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = Math.floor(viewport.width * dpr);
        canvas.height = Math.floor(viewport.height * dpr);
        canvas.style.width = viewport.width + 'px';
        canvas.style.height = viewport.height + 'px';
        ctx.scale(dpr, dpr);
        container.appendChild(canvas);

        return page.render({ canvasContext: ctx, viewport: viewport }).promise;
      });
    }
  </script>
</body>
</html>
