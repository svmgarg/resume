<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; font-family: sans-serif; background: #f0f0f0; }
    header {
      background: #333;
      color: #fff;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.1rem; }
    header a {
      color: #fff;
      text-decoration: none;
      background: #555;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    header a:hover { background: #777; }
    .pdf-container {
      flex: 1;
      width: 100%;
      overflow: hidden;
    }
    .pdf-container object,
    .pdf-container embed {
      width: 100%;
      height: 100%;
      display: block;
      border: none;
    }
    .fallback {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 20px;
      gap: 12px;
    }
    .fallback p { color: #555; }
    .fallback a {
      color: #fff;
      text-decoration: none;
      background: #555;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 0.95rem;
    }
    .fallback a:hover { background: #777; }
    @media (max-width: 600px) {
      header { padding: 8px 12px; }
      header h1 { font-size: 1rem; }
      header a { padding: 5px 10px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Resume</h1>
    <a href="Shivam_Resume.pdf" download>Download PDF</a>
  </header>
  <div class="pdf-container">
    <object data="Shivam_Resume.pdf" type="application/pdf">
      <embed src="Shivam_Resume.pdf" type="application/pdf">
        <div class="fallback">
          <p>Your browser does not support inline PDF viewing.</p>
          <a href="Shivam_Resume.pdf" target="_blank">Open PDF</a>
          <a href="Shivam_Resume.pdf" download>Download PDF</a>
        </div>
      </embed>
    </object>
  </div>
</body>
</html>
